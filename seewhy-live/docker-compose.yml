version: '3.9'

services:
  app:
    build: .
    container_name: seewhy-live
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    networks:
      - seewhy-net

  nginx:
    image: nginx:alpine
    container_name: seewhy-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - seewhy-net

networks:
  seewhy-net:
    driver: bridge
