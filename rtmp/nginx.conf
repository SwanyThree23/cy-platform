worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            
            # Enable recording (optional)
            # record all;
            # record_path /var/recordings;
            # record_unique on;
            # record_suffix .flv;
            
            # Allow publishing from backend
            allow publish all;
            
            # Webhook for backend to handle RTMP -> WebRTC bridge
            on_publish http://backend:3001/api/rtmp/on-publish;
            
            # Notify on stream stop
            on_publish_done http://backend:3001/api/rtmp/on-publish-done;
            
            # Push to other services
            # push rtmp://other-server/app/stream;
            
            # HLS (for browser playback)
            hls on;
            hls_path /var/hls;
            hls_fragment 3;
            hls_playlist_length 60;
        }
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    server {
        listen 8080;
        
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
        
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        
        location /stat.xsl {
            root /var/www/rtmp;
        }
    }
}
